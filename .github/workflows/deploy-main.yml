name: Deploy On Main Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" << 'EOF'
          set -e
          TARGET=/home/server/home_dir/study_site

          cd "$TARGET"
          git fetch origin
          git reset --hard origin/main

          cd "$TARGET/server"
          npm install --no-audit --no-fund

          cd "$TARGET/client"
          npm install --no-audit --no-fund
          VITE_API_BASE_URL="https://hanglish.matzip84.com" npm run build

          cd "$TARGET/server"
          pm2 restart study-site-server --update-env
          pm2 save
          EOF
